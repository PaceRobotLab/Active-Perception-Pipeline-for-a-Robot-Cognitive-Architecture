# Docker Compose V2 — no 'version' field needed

services:
  active-perception:
    build: .
    image: active-perception-pipeline

    # ── GPU ───────────────────────────────────────────────────────────────────
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

      # ── Open3D display (X11 forwarding on Linux) ──────────────────────────
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1

      # ── HuggingFace cache dir inside container ────────────────────────────
      - HF_HOME=/hf_cache

    volumes:
      # X11 socket for Open3D window
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # SAM checkpoint — MUST exist on host before running.
      # Place sam_vit_b_01ec64.pth in the same folder as this file.
      # Download: wget https://dl.fbaipublicfiles.com/segment_anything/sam_vit_b_01ec64.pth
      # If this file is missing, Docker will create a directory here instead — causing a crash.
      - ./sam_vit_b_01ec64.pth:/sam_vit_b_01ec64.pth:ro

      # HuggingFace model cache (VGGT ~4GB + DINO ~340MB) — persists across runs
      - hf_cache:/hf_cache

      # Detection results written back to host
      - ./results:/app/results

    # ── ZED Camera (USB device passthrough on Linux) ──────────────────────────
    # Check your ZED device indices with: ls /dev/video*
    # ZED cameras typically claim 2 consecutive /dev/video* nodes
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    device_cgroup_rules:
      - "c 189:* rmw"   # USB device major 189 — required for ZED SDK firmware

    # stdin_open + tty are required: the pipeline starts with an input() prompt
    # Use 'docker compose run' (not 'up') to keep stdin attached — see README
    stdin_open: true
    tty: true

    restart: "no"

volumes:
  hf_cache:
    driver: local
